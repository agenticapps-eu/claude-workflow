name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  migrations-and-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Check out workflow-core (canonical spec)
        uses: actions/checkout@v4
        with:
          repository: agenticapps-eu/agenticapps-workflow-core
          ref: main
          path: .core-spec
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Migration test suite
        env:
          CORE_SPEC_DIR: ${{ github.workspace }}/.core-spec
          CORE_SPEC_REQUIRED: "1"
        run: bash migrations/run-tests.sh
      - name: Snapshot drift guard
        run: bash migrations/check-snapshot-parity.sh
      - name: Snapshot assembles from source (no drift)
        run: bash bin/build-snapshot.sh --check
