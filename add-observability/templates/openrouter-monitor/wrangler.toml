# openrouter-monitor — Cloudflare Worker scheduled handler.
#
# Polls OpenRouter /api/v1/key every 15 min. Emits credit_pulse always,
# credit_low warn at >=85%, OpenRouterBudgetCriticalError at >=95%.
#
# See ADR-0030 + add-observability/openrouter-integration.md.

name = "openrouter-monitor"
main = "src/index.ts"
compatibility_date = "2026-05-29"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/15 * * * *"]

# ─── Secrets ────────────────────────────────────────────────────────────────
# Set via `wrangler secret put <name>`:
#
#   OPENROUTER_API_KEY    Read-only OpenRouter API key. MUST be keys:read scope
#                         ONLY — never the generation key. A leaked generation
#                         key would burn the org's budget cap within minutes.
#                         Format: sk-or-v1-<random>
#
#   SENTRY_DSN            Sentry DSN. Required — without it, the destinations
#                         registry never initialises and logEvent / captureError
#                         no-op silently.
#
#   AXIOM_TOKEN           (Optional) Axiom ingest token for time-series logEvent
#                         destination.
#   AXIOM_DATASET         (Optional) Axiom dataset name.
#
# ─── Vars (overridable from this file) ──────────────────────────────────────

[vars]
DEPLOY_ENV = "production"
SERVICE_NAME = "openrouter-monitor"

# Optional threshold overrides. Defaults in src/check-credit.ts:
#   OPENROUTER_WARNING_RATIO  = 0.85
#   OPENROUTER_CRITICAL_RATIO = 0.95
#
# OPENROUTER_WARNING_RATIO = "0.85"
# OPENROUTER_CRITICAL_RATIO = "0.95"
